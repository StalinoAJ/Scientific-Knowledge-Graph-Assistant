version: '3.8'

services:
  # Ollama LLM Service - runs Llama 3.2 model in container
  ollama:
    image: ollama/ollama:latest
    container_name: sci-kg-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_FLASH_ATTENTION=true      # Enable Flash Attention for faster inference
      - OLLAMA_KEEP_ALIVE=30m            # Keep model loaded for 30 mins
      - OLLAMA_NUM_PARALLEL=2            # Allow 2 parallel requests
      - OLLAMA_CONTEXT_LENGTH=2048       # Reduced context for faster inference
    volumes:
      - ./data/ollama:/root/.ollama  # Persist models locally
    networks:
      - sci-kg-network
    # GPU support for NVIDIA RTX 4060
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # Init service to pull llama3.2 model on first startup
  init-ollama:
    image: ollama/ollama:latest
    container_name: sci-kg-init-ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - sci-kg-network
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2 && echo 'Model llama3.2 ready!'"]
    restart: "no"

  neo4j:
    image: neo4j:5.15-community
    container_name: sci-kg-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/scientifickg123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2g
    volumes:
      - ./data/graph_db/data:/data
      - ./data/graph_db/logs:/logs
      - ./data/graph_db/import:/var/lib/neo4j/import
      - ./data/graph_db/plugins:/plugins
    networks:
      - sci-kg-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    entrypoint: ["/bin/sh", "-c", "rm -f /data/databases/store_lock /data/databases/neo4j/database_lock /data/databases/system/database_lock && exec /startup/docker-entrypoint.sh neo4j"]
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sci-kg-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=scientifickg123
      - OLLAMA_HOST=http://ollama:11434  # Connect to Ollama container
      - CHROMADB_PATH=/app/data/chromadb
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./tests:/app/tests
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - sci-kg-network
    command: uvicorn backend.api.server:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sci-kg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sci-kg-network
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped

networks:
  sci-kg-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_data:
